<style>
/* Full screen premium dark luxury overlay */
.loader-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: #0a0a0a; /* Premium Black Background */
    z-index: 99999;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.6s;
}

/* Luxury Double Diamond Spinner */
.diamond-wrapper {
    position: relative;
    width: 50px;
    height: 50px;
    transform: rotate(45deg);
    animation: luxuryRotate 2.5s infinite cubic-bezier(0.77, 0, 0.175, 1);
}

.diamond-outer {
    position: absolute;
    width: 100%;
    height: 100%;
    border: 2px solid transparent;
    border-top-color: #d4af37; /* Metallic Gold */
    border-bottom-color: #d4af37;
    animation: pulseScale 1.5s infinite ease-in-out alternate;
}

.diamond-inner {
    position: absolute;
    top: 15%;
    left: 15%;
    width: 70%;
    height: 70%;
    border: 2px solid transparent;
    border-left-color: #03a84e; /* Brand Green */
    border-right-color: #03a84e;
    animation: luxuryRotateInner 2s infinite linear reverse;
}

/* Luxury Brand Text Animation */
.loader-text {
    margin-top: 35px;
    font-family: 'Playfair Display', serif;
    color: #d4af37; /* Gold Text */
    font-size: 11px;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-align: center;
    text-indent: 6px;
    animation: textGlow 1.5s infinite ease-in-out alternate;
}

@keyframes luxuryRotate {
    0% { transform: rotate(45deg); }
    100% { transform: rotate(405deg); }
}

@keyframes luxuryRotateInner {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(-360deg); }
}

@keyframes pulseScale {
    0% { transform: scale(0.9); }
    100% { transform: scale(1.1); }
}

@keyframes textGlow {
    0% { opacity: 0.3; letter-spacing: 5px; }
    100% { opacity: 0.9; letter-spacing: 7px; }
}

.loader-hidden {
    opacity: 0;
    visibility: hidden;
}
</style>

.ai-chat-btn {
